<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xuân Gomoku 19×19</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif; background: #d0d0d0;
  display: flex; flex-direction: column; align-items: center;
  padding: 12px 6px; user-select: none; min-height: 100vh;
}
#top-bar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px; flex-wrap: wrap; justify-content: center;
}
#avatar-img {
  width: 44px; height: 44px; border-radius: 50%;
  object-fit: cover; border: 2.5px solid #cc0000;
  flex-shrink: 0;
}
#top-bar h1 { font-size: 20px; font-weight: 900; color: #111; letter-spacing: 3px; }
#ai-panel {
  display: flex; align-items: center; gap: 6px;
  background: #fff; border: 2px solid #bbb; border-radius: 6px; padding: 4px 10px;
}
#ai-panel label { font-size: 12px; color: #333; font-weight: 700; }
#ai-select {
  font-size: 12px; border: 1.5px solid #aaa; border-radius: 4px;
  padding: 2px 6px; cursor: pointer; background: #fff; font-weight: 600;
}
.btn-reset {
  padding: 5px 14px; border: 2px solid #c00; border-radius: 4px;
  cursor: pointer; font-size: 12px; background: #fff; color: #c00; font-weight: 700;
}
.btn-reset:hover { background: #fff0f0; }
#phase-bar {
  font-size: 12px; color: #444; margin-bottom: 3px;
  min-height: 18px; text-align: center; font-weight: 600;
}
#status-bar {
  font-size: 14px; color: #222; font-weight: 700;
  min-height: 26px; margin-bottom: 6px; text-align: center;
}
.turn-x { color: #cc0000; }
.turn-o { color: #007733; }
#board-wrap { overflow: auto; max-width: 100%; }
#board { display: grid; gap: 2px; background: #555; border: 3px solid #444; }
.cell {
  width: 34px; height: 34px; background: #fff;
  display: flex; align-items: center; justify-content: center;
  position: relative; cursor: pointer; transition: background 0.08s;
}
.cell:hover:not(.neutral):not(.has-piece) { background: #fffacc; }
.cell-num {
  font-size: 10px; color: #333; font-weight: 900;
  pointer-events: none; line-height: 1;
}
.cell.neutral { background: #2d3a50 !important; cursor: not-allowed; }
.cell.suggest { background: #fff176 !important; }
.cell.flash-err { background: #ffcccc !important; }
.cell.last-move::after {
  content: ''; position: absolute; inset: 2px;
  border: 2.5px solid #ff9900; pointer-events: none; z-index: 3;
}
.piece {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; position: absolute;
  pointer-events: none; z-index: 2;
}
.piece-x { background: radial-gradient(circle at 38% 32%, #ff7777, #cc0000); color: #fff; border: 2px solid #880000; }
.piece-o { background: radial-gradient(circle at 38% 32%, #66ee99, #008844); color: #fff; border: 2px solid #005522; }
.piece-neutral { width: 30px; height: 30px; background: #2d3a50; border: 2px solid #6677bb; border-radius: 4px; }
#ctx-menu {
  position: fixed; background: #fff; border: 2px solid #aaa;
  border-radius: 6px; box-shadow: 3px 6px 16px rgba(0,0,0,0.25);
  z-index: 9999; min-width: 160px; display: none;
}
#ctx-menu div {
  padding: 8px 16px; font-size: 13px; cursor: pointer;
  color: #222; font-weight: 600; border-bottom: 1px solid #eee;
}
#ctx-menu div:last-child { border-bottom: none; }
#ctx-menu div:hover { background: #f5f5f5; }
#ctx-menu .danger { color: #c00; }
</style>
</head>

</h1>
  <div id="ai-panel">
    <label>AI gợi ý:</label>
    <select id="ai-select">
      <option value="none">Không ai</option>
      <option value="X">X</option>
      <option value="O">O</option>
      <option value="both">Cả hai</option>
    </select>
  </div>
  <button class="btn-reset" onclick="resetAll()">↺ Reset</button>
</div>

<div id="phase-bar"></div>
<div id="status-bar"></div>
<div id="board-wrap"><div id="board"></div></div>


<div id="ctx-menu">
  <div class="danger" onclick="ctxDo('del')">🗑 Xóa quân</div>
  <div onclick="ctxDo('X')">⚪ Thêm X (đỏ)</div>
  <div onclick="ctxDo('O')">🟢 Thêm O (xanh)</div>
  <div onclick="ctxDo('neu')">■ Đặt ô trung lập</div>
</div>

<script>
const BS = 19, WIN = 5, XR = 3;
let board, neutrals, turn, phase, xCount, firstX, winner, lastMove, suggestCell, ctxCell;

function init() {
  board    = Array.from({length:BS}, () => Array(BS).fill(null));
  neutrals = []; turn = 'X'; phase = 'setup';
  xCount   = 0; firstX = null; winner = null; lastMove = null;
  suggestCell = null; ctxCell = null;
  render();
}
function resetAll() { document.getElementById("ai-select").value = "none"; init(); }

/* số hiển thị: bỏ bội 20, liên tục 19→21, 39→41... */
function cellIdx(r,c) { return r*BS+c+1; }
function displayNum(i) { return i + Math.floor((i-1)/19); }

/* helpers */
function isNeu(r,c){ return neutrals.some(([nr,nc])=>nr===r&&nc===c); }
function adjNeu(r,c){ return neutrals.some(([nr,nc])=>Math.abs(r-nr)<=1&&Math.abs(c-nc)<=1); }
function cheby(r1,c1,r2,c2){ return Math.max(Math.abs(r1-r2),Math.abs(c1-c2)); }

function checkWin(b,r,c,p){
  const dirs=[[0,1],[1,0],[1,1],[1,-1]];
  for(const[dr,dc]of dirs){
    let n=1;
    for(let i=1;i<5;i++){const nr=r+dr*i,nc=c+dc*i;if(nr<0||nr>=BS||nc<0||nc>=BS||b[nr][nc]!==p)break;n++;}
    for(let i=1;i<5;i++){const nr=r-dr*i,nc=c-dc*i;if(nr<0||nr>=BS||nc<0||nc>=BS||b[nr][nc]!==p)break;n++;}
    if(n>=WIN)return true;
  }
  return false;
}

/* ── AI engine ── */
const D4=[[0,1],[1,0],[1,1],[1,-1]];
function isBlk(r,c,neu){ return r<0||r>=BS||c<0||c>=BS||neu.some(([nr,nc])=>nr===r&&nc===c); }

function evalDir(b,neu,r,c,dr,dc,p){
  let n=1,oA=0,oB=0;
  for(let i=1;i<=4;i++){const nr=r+dr*i,nc=c+dc*i;if(isBlk(nr,nc,neu))break;if(b[nr][nc]===p)n++;else if(!b[nr][nc]){oA=1;break;}else break;}
  for(let i=1;i<=4;i++){const nr=r-dr*i,nc=c-dc*i;if(isBlk(nr,nc,neu))break;if(b[nr][nc]===p)n++;else if(!b[nr][nc]){oB=1;break;}else break;}
  const op=oA+oB;
  if(n>=5)return 1e7; if(n===4&&op===2)return 5e5; if(n===4&&op===1)return 5e4;
  if(n===3&&op===2)return 1e4; if(n===3&&op===1)return 1e3;
  if(n===2&&op===2)return 300; if(n===2&&op===1)return 100; if(n===1&&op===2)return 20;
  return 0;
}
function evalCell(b,neu,r,c,p){ let s=0; for(const[dr,dc]of D4)s+=evalDir(b,neu,r,c,dr,dc,p); return s; }
function evalBoard(b,neu){
  let s=0;
  for(let r=0;r<BS;r++)for(let c=0;c<BS;c++){
    if(b[r][c]==='O')s+=evalCell(b,neu,r,c,'O');
    else if(b[r][c]==='X')s-=evalCell(b,neu,r,c,'X')*1.1;
  }
  return s;
}

/* lấy ô ứng viên quanh quân hiện có, có filter tùy chọn */
function getCands(b,neu,lim,filterFn){
  const seen=new Set(); let any=false;
  for(let r=0;r<BS;r++)for(let c=0;c<BS;c++)if(b[r][c]){
    any=true;
    for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<BS&&nc>=0&&nc<BS&&!b[nr][nc]&&!isBlk(nr,nc,neu))seen.add(nr*100+nc);
    }
  }
  if(!any)for(let r=7;r<=11;r++)for(let c=7;c<=11;c++)if(!b[r][c]&&!isBlk(r,c,neu))seen.add(r*100+c);
  let cells=[...[...seen].map(k=>[Math.floor(k/100),k%100])];
  if(filterFn)cells=cells.filter(([r,c])=>filterFn(r,c));
  cells.sort(([r1,c1],[r2,c2])=>
    (evalCell(b,neu,r2,c2,'O')+evalCell(b,neu,r2,c2,'X'))-
    (evalCell(b,neu,r1,c1,'O')+evalCell(b,neu,r1,c1,'X'))
  );
  return lim ? cells.slice(0,lim) : cells;
}

/* scan toàn bàn với filter — dùng khi bàn còn ít quân */
function getCandsAll(b,neu,filterFn){
  let cells=[];
  for(let r=0;r<BS;r++)for(let c=0;c<BS;c++)
    if(!b[r][c]&&!isBlk(r,c,neu))cells.push([r,c]);
  if(filterFn)cells=cells.filter(([r,c])=>filterFn(r,c));
  cells.sort(([r1,c1],[r2,c2])=>
    (evalCell(b,neu,r2,c2,'O')+evalCell(b,neu,r2,c2,'X'))-
    (evalCell(b,neu,r1,c1,'O')+evalCell(b,neu,r1,c1,'X'))
  );
  return cells;
}

function minimax(b,neu,depth,alpha,beta,maxing){
  if(depth===0)return evalBoard(b,neu);
  const cands=getCands(b,neu,12,null); if(!cands.length)return 0;
  if(maxing){
    let best=-Infinity;
    for(const[r,c]of cands){
      b[r][c]='O'; if(checkWin(b,r,c,'O')){b[r][c]=null;return 9e6+depth;}
      const s=minimax(b,neu,depth-1,alpha,beta,false); b[r][c]=null;
      best=Math.max(best,s); alpha=Math.max(alpha,best); if(alpha>=beta)break;
    }
    return best;
  }else{
    let best=Infinity;
    for(const[r,c]of cands){
      b[r][c]='X'; if(checkWin(b,r,c,'X')){b[r][c]=null;return -9e6-depth;}
      const s=minimax(b,neu,depth-1,alpha,beta,true); b[r][c]=null;
      best=Math.min(best,s); beta=Math.min(beta,best); if(alpha>=beta)break;
    }
    return best;
  }
}

function getAISuggest(player, filterFn){
  const work=board.map(row=>[...row]);
  const opp=player==='O'?'X':'O';

  /* ưu tiên getCands (nhanh hơn), fallback getCandsAll nếu filter loại hết */
  function bestCands(lim){
    let c=getCands(work,neutrals,lim,filterFn);
    if(!c.length) c=getCandsAll(work,neutrals,filterFn);
    return c;
  }

  const pool=bestCands(30);
  if(!pool.length) return null;

  // Thắng ngay
  for(const[r,c]of pool){work[r][c]=player;if(checkWin(work,r,c,player)){work[r][c]=null;return[r,c];}work[r][c]=null;}
  // Chặn đối
  for(const[r,c]of pool){work[r][c]=opp;if(checkWin(work,r,c,opp)){work[r][c]=null;return[r,c];}work[r][c]=null;}

  const evalPool=bestCands(20);
  const isMax=player==='O';
  let best=isMax?-Infinity:Infinity, bestMove=evalPool[0];
  for(const[r,c]of evalPool){
    work[r][c]=player;
    if(checkWin(work,r,c,player)){work[r][c]=null;return[r,c];}
    const s=minimax(work,neutrals,3,-Infinity,Infinity,!isMax);
    work[r][c]=null;
    if(isMax?s>best:s<best){best=s;bestMove=[r,c];}
  }
  return bestMove;
}

/* ── computeSuggest ── */
function computeSuggest(){
  const sel=document.getElementById('ai-select').value;
  if(sel==='none'||winner){suggestCell=null;return;}
  // Gợi ý ngay khi đủ 3 ô trung lập (dù còn setup hay đã play)
  if(neutrals.length<3){suggestCell=null;return;}

  const sugFor=sel==='both'?turn:sel;
  if(sugFor!==turn){suggestCell=null;return;}

  let filterFn=null;
  if(turn==='X'){
    if(xCount===0){
      /* Nước X đầu: phải cạnh ô trung lập */
      filterFn=(r,c)=>adjNeu(r,c);
    } else if(xCount===1&&firstX){
      /* Nước X thứ 2: phải ngoài bán kính XR so với X nước 1 */
      const [fr,fc]=firstX;
      filterFn=(r,c)=>cheby(r,c,fr,fc)>XR;
    }
  }

  suggestCell=getAISuggest(turn,filterFn);
}

/* ── Render ── */
function render(){
  const el=document.getElementById('board');
  el.style.gridTemplateColumns=`repeat(${BS},34px)`;
  el.style.gridTemplateRows=`repeat(${BS},34px)`;
  el.innerHTML='';
  computeSuggest();

  for(let r=0;r<BS;r++)for(let c=0;c<BS;c++){
    const div=document.createElement('div');
    div.className='cell';
    div.dataset.r=r; div.dataset.c=c;

    const neu=isNeu(r,c);
    const piece=board[r][c];

    if(neu){
      div.classList.add('neutral');
      const p=document.createElement('div'); p.className='piece piece-neutral';
      div.appendChild(p);
    } else if(piece){
      div.classList.add('has-piece');
      const p=document.createElement('div');
      p.className='piece piece-'+piece.toLowerCase();
      p.textContent=piece; div.appendChild(p);
    } else {
      const span=document.createElement('span');
      span.className='cell-num';
      span.textContent=displayNum(cellIdx(r,c));
      div.appendChild(span);
    }

    if(suggestCell&&suggestCell[0]===r&&suggestCell[1]===c&&!piece&&!neu)
      div.classList.add('suggest');
    if(lastMove&&lastMove[0]===r&&lastMove[1]===c)
      div.classList.add('last-move');

    div.addEventListener('click',()=>handleClick(r,c));
    div.addEventListener('contextmenu',e=>{e.preventDefault();openCtx(e,r,c);});
    el.appendChild(div);
  }
  updateStatus();
}

function updateStatus(){
  const phEl=document.getElementById('phase-bar');
  const stEl=document.getElementById('status-bar');
  if(phase==='setup'){
    const rem=3-neutrals.length;
    if(rem>0){
      phEl.innerHTML=`Chọn thêm <b>${rem}</b> ô trung lập${neutrals.length?' · Đã chọn: '+neutrals.map(([r,c])=>displayNum(cellIdx(r,c))).join(', '):''}`;
    } else {
      phEl.textContent='Đủ 3 ô trung lập — bắt đầu đặt quân!';
    }
    stEl.textContent='';
  } else {
    phEl.textContent='';
    if(winner){
      stEl.innerHTML=`<span class="turn-${winner.toLowerCase()}">${winner} THẮNG! 🎉</span>`;
    } else {
      const sel=document.getElementById('ai-select').value;
      const sugFor=sel==='both'?turn:sel;
      let hint='';
      if(sel!=='none'&&sugFor===turn&&suggestCell)
        hint=` &nbsp;·&nbsp; 💡 Gợi ý ô: <b>${displayNum(cellIdx(suggestCell[0],suggestCell[1]))}</b>`;
      stEl.innerHTML=`Lượt: <span class="turn-${turn.toLowerCase()}">${turn}</span>${hint}`;
    }
  }
}

/* ── Click ── */
function handleClick(r,c){
  if(phase==='setup'){
    if(isNeu(r,c)){
      neutrals=neutrals.filter(([nr,nc])=>!(nr===r&&nc===c));
      if(neutrals.length<3&&phase==='play') phase='setup'; /* rollback nếu bỏ xuống <3 */
      render(); return;
    }
    if(neutrals.length>=3) return;
    neutrals.push([r,c]);
    if(neutrals.length===3) phase='play'; /* tự chuyển sang play */
    render(); return;
  }

  if(winner||board[r][c]||isNeu(r,c)) return;

  if(turn==='X'){
    if(xCount===0&&!adjNeu(r,c)){
      flash(r,c,'Nước X thứ 1 phải đặt cạnh ô trung lập!'); return;
    }
    if(xCount===1&&firstX&&cheby(r,c,firstX[0],firstX[1])<=XR){
      flash(r,c,`Nước X thứ 2 phải ngoài bán kính ${XR} ô so với X nước 1!`); return;
    }
  }

  board[r][c]=turn; lastMove=[r,c];
  if(turn==='X'){if(xCount===0)firstX=[r,c]; xCount++;}
  if(checkWin(board,r,c,turn)) winner=turn;
  else turn=turn==='X'?'O':'X';
  render();
}

function flash(r,c,msg){
  const el=document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if(el){el.classList.add('flash-err');setTimeout(()=>el.classList.remove('flash-err'),500);}
  document.getElementById('status-bar').textContent=msg;
  setTimeout(updateStatus,1800);
}

/* ── Context menu ── */
function openCtx(e,r,c){
  ctxCell=[r,c];
  const m=document.getElementById('ctx-menu');
  m.style.display='block'; m.style.left=e.clientX+'px'; m.style.top=e.clientY+'px';
}
function closeCtx(){ document.getElementById('ctx-menu').style.display='none'; ctxCell=null; }

function ctxDo(action){
  if(!ctxCell)return;
  const[r,c]=ctxCell; closeCtx();
  if(action==='del'){
    board[r][c]=null; neutrals=neutrals.filter(([nr,nc])=>!(nr===r&&nc===c));
    if(winner)winner=null;
  } else if(action==='X'){
    board[r][c]='X'; neutrals=neutrals.filter(([nr,nc])=>!(nr===r&&nc===c));
  } else if(action==='O'){
    board[r][c]='O'; neutrals=neutrals.filter(([nr,nc])=>!(nr===r&&nc===c));
  } else if(action==='neu'){
    board[r][c]=null;
    if(!isNeu(r,c))neutrals.push([r,c]);
  }
  render();
}

document.addEventListener('click',e=>{if(!e.target.closest('#ctx-menu'))closeCtx();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCtx();});
document.getElementById('ai-select').addEventListener('change',()=>render());

init();
</script>
</body>
